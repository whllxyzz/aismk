<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JEDI AI · Asisten & Scanner HD</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#a8d5c4">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JEDI AI">
    <link rel="apple-touch-icon" href="https://i.ibb.co.com/6j3pj4S/pp-smkn.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #fdfaf6;
            font-family: 'Courier New', Courier, monospace;
            color: #1a1a1a;
            height: 100vh;      /* fallback */
            height: 100dvh;     /* dynamic viewport */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* Card dan tombol gaya lama */
        .card {
            background-color: #fff;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            border-radius: 0;
        }
        .input-box {
            border: 2px solid #000;
            background: #fff;
            border-radius: 0;
        }
        .btn-action {
            background-color: #ffd05a;
            border: 2px solid #000;
            box-shadow: 3px 3px 0px #000;
            cursor: pointer;
            transition: all 0.05s linear;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-action:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        .user-bubble {
            background-color: #fde047;
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
            border-radius: 16px;
        }
        .ai-bubble {
            background-color: #ffcceb;
            border: 2px solid #000;
            box-shadow: 2px 2px 0px #000;
            border-radius: 16px;
        }
        #chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .loading-dots::after {
            content: '...';
            animation: dots 1.2s steps(4, end) infinite;
            display: inline-block;
            width: 24px;
        }
        @keyframes dots {
            0%,20%{content:'';}40%{content:'.';}80%,100%{content:'..';}
        }
        .install-btn {
            background: #000;
            color: #ffd05a;
            border: none;
            border-radius: 40px;
            padding: 6px 14px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }
        .history-btn, .newchat-btn {
            background: transparent;
            border: 2px solid #000;
            border-radius: 30px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        /* Modal riwayat */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal-content {
            background: white;
            border: 2px solid black;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 16px;
        }
        .session-item {
            border-bottom: 1px solid #ccc;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .session-item:hover { background: #f0f0f0; }
        
        /* Responsif: pada layar lebar, chat window memiliki max-width */
        @media (min-width: 768px) {
            .chat-container {
                max-width: 800px;
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="bg-white border-b-2 border-black px-4 py-3 flex flex-wrap justify-between items-center gap-2 flex-shrink-0">
        <div class="flex items-center gap-2">
            <img src="https://i.ibb.co.com/6j3pj4S/pp-smkn.jpg" alt="Logo" class="w-10 h-10 border-2 border-black rounded-lg bg-white">
            <h1 class="font-bold text-base sm:text-lg">AiSISTENS <span class="text-indigo-700">TKJ1</span></h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="newChatBtn" class="newchat-btn" title="Percakapan Baru">
                <i data-lucide="plus-square" class="w-4 h-4"></i> <span class="hidden sm:inline">New Chat</span>
            </button>
            <button id="historyBtn" class="history-btn" title="Riwayat Chat">
                <i data-lucide="clock" class="w-4 h-4"></i> <span class="hidden sm:inline">Riwayat</span>
            </button>
            <i data-lucide="bell" class="w-5 h-5 cursor-pointer"></i>

        </div>
    </div>

    <!-- Chat area utama (full flex) -->
    <div class="flex-1 overflow-hidden p-3 flex flex-col">
        <div class="card flex-1 flex flex-col bg-amber-200 overflow-hidden" style="min-height: 0;">
            <div class="flex items-center gap-2 border-b-2 border-black p-3 pb-2">
                <i data-lucide="bot" class="w-5 h-5"></i>
                <span class="font-bold">Asisten & Scanner HD</span>
                <span id="sessionBadge" class="text-xs bg-black text-white px-2 py-0.5 rounded-full ml-auto">Chat #1</span>
            </div>
            <div id="chat-window" class="flex-1 overflow-y-auto p-3 space-y-3">

            </div>
        </div>

        <!-- Input area (tetap di bawah) -->
        <div class="flex gap-3 items-center mt-4 flex-shrink-0">
            <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/jpg, image/webp">
            <button id="uploadTriggerBtn" class="btn-action w-12 h-12 rounded-full text-xl">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
            <input type="text" id="userInput" class="input-box flex-1 p-3 rounded-full outline-none font-mono text-sm" placeholder="Tulis pesan...">
            <button id="sendBtn" class="btn-action px-5 py-3 rounded-full font-bold uppercase text-sm">KIRIM</button>
        </div>
    </div>

    <!-- Modal Riwayat Session -->
    <div id="historyModal" class="modal hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg">📁 Riwayat Percakapan</h2>
                <button id="closeHistoryModal" class="text-2xl">&times;</button>
            </div>
            <div id="sessionList" class="space-y-2">
                <!-- Daftar session akan diisi JS -->
            </div>
            <div class="mt-4 flex justify-between">
                <button id="deleteAllSessions" class="bg-red-500 text-white px-3 py-1 border border-black text-sm">Hapus Semua</button>
                <span id="sessionCount" class="text-xs text-gray-500"></span>
            </div>
        </div>
    </div>

    <script>
        // ======================== MULTI SESSION HISTORY ========================
        const SESSIONS_KEY = 'jedi_sessions';
        const CURRENT_ID_KEY = 'jedi_current_session_id';
        
        function loadSessions() {
            const stored = localStorage.getItem(SESSIONS_KEY);
            if (stored) {
                try {
                    return JSON.parse(stored);
                } catch(e) { return []; }
            }
            return [];
        }
        
        function saveSessions(sessions) {
            localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
        }
        
        function getCurrentSessionId() {
            return localStorage.getItem(CURRENT_ID_KEY);
        }
        
        function setCurrentSessionId(id) {
            localStorage.setItem(CURRENT_ID_KEY, id);
        }
        
        function getSession(id) {
            const sessions = loadSessions();
            return sessions.find(s => s.id === id);
        }
        
        function updateSession(id, messages) {
            const sessions = loadSessions();
            const index = sessions.findIndex(s => s.id === id);
            if (index !== -1) {
                sessions[index].messages = messages;
                saveSessions(sessions);
            }
        }
        
        function addNewSession() {
            const sessions = loadSessions();
            const newId = Date.now().toString();
            const defaultMsg = "Halo! Saya asisten AI + scanner dokumen. Upload foto buku/catatan → PDF super tajam. Tanya jadwal atau materi TKJ juga bisa!";
            const newSession = {
                id: newId,
                name: new Date().toLocaleString('id-ID'),
                messages: [{ text: defaultMsg, isUser: false, timestamp: Date.now() }]
            };
            sessions.unshift(newSession);
            saveSessions(sessions);
            setCurrentSessionId(newId);
            renderCurrentChat();
            updateSessionBadge();
            return newId;
        }
        
        function saveCurrentSession() {
            const currentId = getCurrentSessionId();
            if (!currentId) return;
            const currentMessages = getCurrentMessagesFromDOM();
            if (currentMessages.length === 0) return;
            const sessions = loadSessions();
            const index = sessions.findIndex(s => s.id === currentId);
            if (index !== -1) {
                sessions[index].messages = currentMessages;
                sessions[index].name = new Date().toLocaleString('id-ID');
                saveSessions(sessions);
            } else {
                const newSession = {
                    id: currentId,
                    name: new Date().toLocaleString('id-ID'),
                    messages: currentMessages
                };
                sessions.unshift(newSession);
                saveSessions(sessions);
            }
        }
        
        function getCurrentMessagesFromDOM() {
            const chatWindow = document.getElementById('chat-window');
            const bubbles = chatWindow.querySelectorAll('.user-bubble, .ai-bubble');
            const messages = [];
            bubbles.forEach(bubble => {
                const isUser = bubble.classList.contains('user-bubble');
                const text = bubble.textContent || '';
                if (text.trim()) {
                    messages.push({ text: text, isUser: isUser, timestamp: Date.now() });
                }
            });
            return messages;
        }
        
        function renderSessionChat(sessionId) {
            const session = getSession(sessionId);
            if (!session) return;
            const chatWindow = document.getElementById('chat-window');
            chatWindow.innerHTML = '';
            session.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = msg.isUser ? 'user-bubble p-3 max-w-[85%] ml-auto text-right font-bold' : 'ai-bubble p-3 max-w-[85%]';
                div.textContent = msg.text;
                chatWindow.appendChild(div);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight;
            setCurrentSessionId(sessionId);
            updateSessionBadge();
        }
        
        function renderCurrentChat() {
            const currentId = getCurrentSessionId();
            if (!currentId) {
                addNewSession();
                return;
            }
            const session = getSession(currentId);
            if (session) {
                renderSessionChat(currentId);
            } else {
                addNewSession();
            }
        }
        
        function updateSessionBadge() {
            const currentId = getCurrentSessionId();
            const sessions = loadSessions();
            const index = sessions.findIndex(s => s.id === currentId);
            const badge = document.getElementById('sessionBadge');
            if (badge) badge.textContent = `Chat #${index+1}`;
        }
        
        function newChat() {
            saveCurrentSession();
            addNewSession();
        }
        
        function deleteSession(sessionId) {
            let sessions = loadSessions();
            sessions = sessions.filter(s => s.id !== sessionId);
            saveSessions(sessions);
            if (getCurrentSessionId() === sessionId) {
                if (sessions.length > 0) {
                    setCurrentSessionId(sessions[0].id);
                    renderCurrentChat();
                } else {
                    addNewSession();
                }
            }
            renderSessionList();
        }
        
        function deleteAllSessions() {
            localStorage.removeItem(SESSIONS_KEY);
            addNewSession();
            renderSessionList();
        }
        
        function renderSessionList() {
            const sessions = loadSessions();
            const container = document.getElementById('sessionList');
            const countSpan = document.getElementById('sessionCount');
            if (!container) return;
            if (sessions.length === 0) {
                container.innerHTML = '<div class="text-center text-gray-500 py-4">Belum ada riwayat</div>';
                if (countSpan) countSpan.textContent = '';
                return;
            }
            let html = '';
            sessions.forEach(session => {
                const preview = session.messages[0]?.text.substring(0, 40) || 'Percakapan kosong';
                const isActive = (session.id === getCurrentSessionId());
                html += `
                    <div class="session-item" data-id="${session.id}">
                        <div class="flex-1">
                            <div class="font-bold">${session.name}</div>
                            <div class="text-xs text-gray-500">${preview}...</div>
                        </div>
                        <div class="flex gap-2">
                            <button class="load-session-btn text-blue-600" data-id="${session.id}">📂</button>
                            <button class="delete-session-btn text-red-600" data-id="${session.id}">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            if (countSpan) countSpan.textContent = `${sessions.length} percakapan`;
            
            document.querySelectorAll('.load-session-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    saveCurrentSession();
                    renderSessionChat(id);
                    document.getElementById('historyModal').classList.add('hidden');
                });
            });
            document.querySelectorAll('.delete-session-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    if (confirm('Hapus percakapan ini?')) deleteSession(id);
                });
            });
            document.querySelectorAll('.session-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('delete-session-btn') || e.target.classList.contains('load-session-btn')) return;
                    const id = item.getAttribute('data-id');
                    saveCurrentSession();
                    renderSessionChat(id);
                    document.getElementById('historyModal').classList.add('hidden');
                });
            });
        }
        
        // ======================== FUNGSI CHAT UTAMA ========================
        let currentUserIP = 'unknown';
        let greeted = false;
        
        function addMessageToDOM(text, isUser = false) {
            const chatWindow = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = isUser ? 'user-bubble p-3 max-w-[85%] ml-auto text-right font-bold' : 'ai-bubble p-3 max-w-[85%]';
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            saveCurrentMessagesToSession();
        }
        
        function saveCurrentMessagesToSession() {
            const currentId = getCurrentSessionId();
            if (!currentId) return;
            const messages = getCurrentMessagesFromDOM();
            const sessions = loadSessions();
            const index = sessions.findIndex(s => s.id === currentId);
            if (index !== -1) {
                sessions[index].messages = messages;
                saveSessions(sessions);
            }
        }
        
        window.addMessage = function(text, isUser) {
            addMessageToDOM(text, isUser);
        };
        
        // ======================== FIREBASE (Custom Replies) ========================
        const firebaseConfig = {
            apiKey: "AIzaSyDummyPleaseReplaceWithYourKey",
            authDomain: "your-project.firebaseapp.com",
            databaseURL: "https://your-project-default-rtdb.firebaseio.com",

            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };
        let database, customRepliesRef;
        let customReplies = {};
        if (firebaseConfig.apiKey !== "AIzaSyDummyPleaseReplaceWithYourKey") {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            customRepliesRef = database.ref('custom_replies');
            customRepliesRef.on('value', (snapshot) => {
                customReplies = snapshot.val() || {};
                if (currentUserIP && customReplies[currentUserIP] && !greeted) {
                    greeted = true;
                    setTimeout(() => addMessage(customReplies[currentUserIP], false), 1500);
                }
            });
        } else {
            customRepliesRef = { on: (_, cb) => cb({ val: () => ({}) }) };
        }
        
        // ======================== TELEGRAM LOG ========================
        const TELEGRAM_TOKEN = '8374022759:AAEOHoYo__6St8eqaumRCzsgKgbGLV08fpU';
        const TELEGRAM_CHAT_ID = '7577331454';
        async function sendToTelegram(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },

        }
        function getDeviceName(ua) {
            if (/android/i.test(ua)) return '📱 Android';
            if (/iphone|ipad|ipod/i.test(ua)) return '🍎 iOS';
            if (/windows/i.test(ua)) return '💻 Windows';

        }
        async function reportDevice() {
            try {
                let ip = 'tidak diketahui';
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ip = data.ip;
                    currentUserIP = ip;
                } catch(e) {}
                const ua = navigator.userAgent;
                const device = getDeviceName(ua);
                const waktu = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
                await sendToTelegram(`🚀 <b>PENGUNJUNG BARU</b>\n🕒 ${waktu}\n🌐 IP: <code>${ip}</code>\n📱 ${device}\n🔗 ${window.location.href}`);
            } catch(e) {}
        }
        window.addEventListener('load', () => { 
            reportDevice();
            renderCurrentChat(); 
        });
        
        // ======================== AI CHAT ========================
        function getAIResponse(msg) {
            const m = msg.toLowerCase().trim();
            if (m.match(/(halo|hai|hey|pagi|siang)/)) return "Halo juga! 😊 Ada yang bisa dibantu? (Jadwal, materi, scan dokumen)";
            if (m.includes("siapa kamu")) return "Saya AiSISTENS, asisten TKJ1 + scanner HD!";
            if (m.includes("jadwal")) return "📅 Jadwal TKJ1:\nSenin: Web Programming\nSelasa: Jaringan Dasar\nRabu: Produktif RPL\nKamis: Basis Data\nJumat: Project";
            if (m.includes("scan") || m.includes("pdf")) return "📸 Klik tombol '+', pilih foto. Saya proses jadi PDF super tajam (adaptive threshold) lalu otomatis download.";
            if (m.includes("terima kasih")) return "Sama-sama! Senang membantu 😊";
            return "Hmm, menarik! Butuh info jadwal, materi TKJ, atau scan dokumen? Silakan upload foto untuk dicoba.";
        }
        
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        function showTyping() {
            const chatWindow = document.getElementById('chat-window');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'ai-bubble p-3 max-w-[85%]';
            typingDiv.innerHTML = '<span class="loading-dots">Memproses</span>';
            chatWindow.appendChild(typingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            showTyping();
            setTimeout(() => {
                const reply = getAIResponse(text);
                removeTyping();
                addMessage(reply, false);
            }, 600);
        }
        
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        
        // ======================== SCANNER HD ========================
        async function adaptiveThresholdScan(imgElement, maxDim = 1600) {
            return new Promise((resolve) => {
                let width = imgElement.width, height = imgElement.height;
                if (width > maxDim) { const scale = maxDim / width; width = maxDim; height = Math.floor(height * scale); }
                const canvas = document.createElement('canvas');
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(imgElement, 0, 0, width, height);
                let imgData = ctx.getImageData(0, 0, width, height);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    data[i] = data[i+1] = data[i+2] = gray;
                }
                ctx.putImageData(imgData, 0, 0);
                const w = width, h = height;
                const integral = new Array((w+1)*(h+1)).fill(0);
                for (let y = 0; y < h; y++) {
                    let rowSum = 0;
                    for (let x = 0; x < w; x++) {
                        const idx = (y * w + x) * 4;
                        rowSum += data[idx];
                        integral[(y+1)*(w+1) + (x+1)] = integral[y*(w+1) + (x+1)] + rowSum;
                    }
                }
                const block = 31;
                const result = ctx.getImageData(0, 0, w, h);
                const resPix = result.data;
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const x1 = Math.max(0, x - block/2);
                        const y1 = Math.max(0, y - block/2);
                        const x2 = Math.min(w, x + block/2);
                        const y2 = Math.min(h, y + block/2);
                        const count = (x2 - x1) * (y2 - y1);
                        const sum = integral[y2*(w+1) + x2] - integral[y1*(w+1) + x2] - integral[y2*(w+1) + x1] + integral[y1*(w+1) + x1];
                        const mean = sum / count;
                        const idx = (y * w + x) * 4;
                        const pixel = data[idx];
                        const threshold = mean * 0.85;
                        const binary = pixel < threshold ? 0 : 255;
                        resPix[idx] = resPix[idx+1] = resPix[idx+2] = binary;
                        resPix[idx+3] = 255;
                    }
                }
                ctx.putImageData(result, 0, 0);
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = w; finalCanvas.height = h;
                const fCtx = finalCanvas.getContext('2d');
                fCtx.drawImage(canvas, 0, 0);
                resolve(finalCanvas.toDataURL('image/jpeg', 0.95));
            });
        }
        async function processAndDownloadPDF(imgElement) {
            try {
                const scanned = await adaptiveThresholdScan(imgElement, 1800);
                const { jsPDF } = window.jspdf;
                const img = new Image();
                img.src = scanned;
                await new Promise(r => { img.onload = r; });
                const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = pdf.internal.pageSize.getHeight();
                let iw = img.width, ih = img.height;
                let ratio = iw / ih;
                let finW = pdfW - 20;
                let finH = finW / ratio;
                if (finH > pdfH - 20) { finH = pdfH - 20; finW = finH * ratio; }
                const xOff = (pdfW - finW)/2, yOff = (pdfH - finH)/2;
                pdf.addImage(scanned, 'JPEG', xOff, yOff, finW, finH, undefined, 'FAST');
                pdf.save(`scan_hd_${Date.now()}.pdf`);
                return true;
            } catch(e) { return false; }
        }
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadTriggerBtn');
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) { addMessage("❌ Upload file gambar.", false); return; }
            addMessage("📤 Memproses scan HD...", false);
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const success = await processAndDownloadPDF(img);
                    if (success) addMessage("✅ Scan sukses! PDF terunduh.", false);
                    else addMessage("⚠️ Gagal, coba foto lebih terang.", false);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });
        
        // ======================== PWA INSTALL ========================
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').style.display = 'inline-block';
        });
        document.getElementById('installBtn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('installBtn').style.display = 'none';
            }
        });
        
        // ======================== MODAL HANDLER ========================
        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const closeHistoryModal = document.getElementById('closeHistoryModal');
        const deleteAllSessionsBtn = document.getElementById('deleteAllSessions');
        
        historyBtn.addEventListener('click', () => {
            renderSessionList();
            historyModal.classList.remove('hidden');
        });
        closeHistoryModal.addEventListener('click', () => {
            historyModal.classList.add('hidden');
        });
        deleteAllSessionsBtn.addEventListener('click', () => {
            if (confirm('Hapus SEMUA riwayat percakapan? Tidak bisa dikembalikan.')) {
                deleteAllSessions();
                renderSessionList();
            }
        });
        window.addEventListener('click', (e) => {
            if (e.target === historyModal) historyModal.classList.add('hidden');
        });
        
        const newChatBtn = document.getElementById('newChatBtn');
        newChatBtn.addEventListener('click', () => {
            if (confirm('Buat percakapan baru? Percakapan saat ini akan disimpan.')) newChat();
        });
        
        setTimeout(() => lucide.createIcons(), 200);
    </script>

    <!-- Dynamic manifest & service worker -->
    <script>
        (function() {
            const manifest = {
                name: "JEDI AI Asisten",
                short_name: "JEDI AI",
                start_url: ".",
                display: "standalone",
                theme_color: "#a8d5c4",
                background_color: "#fdfaf6",
                icons: [
                    { src: "https://i.ibb.co.com/6j3pj4S/pp-smkn.jpg", sizes: "192x192", type: "image/jpeg" },
                    { src: "https://i.ibb.co.com/6j3pj4S/pp-smkn.jpg", sizes: "512x512", type: "image/jpeg" }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            let link = document.querySelector('link[rel="manifest"]');
            if (link) link.href = url;
            if ('serviceWorker' in navigator) {
                const swCode = `self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));`;
                const swBlob = new Blob([swCode], {type: 'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(console.log);
            }
        })();
    </script>
