<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>JEDI AI · Asisten & Scanner HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { background-color: #fdfaf6; font-family: 'Courier New', Courier, monospace; color: #1a1a1a; }
        .sidebar { background-color: #a8d5c4; }
        .card { background-color: #fff; border: 2px solid #000; box-shadow: 4px 4px 0px #000; border-radius: 0; }
        .input-box { border: 2px solid #000; background: #fff; border-radius: 0; }
        .btn-action { background-color: #ffd05a; border: 2px solid #000; box-shadow: 3px 3px 0px #000; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.05s linear; border-radius: 0; }
        .btn-action:active { transform: translate(2px, 2px); box-shadow: none; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: bold; }
        .logo-img { width: 40px; height: 40px; object-fit: contain; border-radius: 8px; border: 2px solid #000; background-color: white; }
        .profile-img { width: 40px; height: 40px; object-fit: cover; border-radius: 50%; background-color: white; border: 1px solid #000; }
        .accent-pink { background-color: #ffcceb; }
        #chat-window::-webkit-scrollbar { width: 4px; }
        .loading-dots::after { content: '...'; animation: dots 1.2s steps(4, end) infinite; display: inline-block; width: 24px; }
        @keyframes dots { 0%,20%{content:'';}40%{content:'.';}80%,100%{content:'..';} }
        @media (max-width: 640px) {
            .sidebar { width: 70px; padding: 1rem 0.5rem; }
            .nav-item span { font-size: 9px; }
            .btn-action { width: 50px; height: 50px; }
            .card { padding: 1rem; }
        }
        .user-bubble { background-color: #fde047; border: 2px solid #000; box-shadow: 2px 2px 0px #000; }
        .ai-bubble { background-color: #ffcceb; border: 2px solid #000; box-shadow: 2px 2px 0px #000; }
        /* Admin panel style */
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .admin-table th, .admin-table td { border: 1px solid #000; padding: 8px; text-align: left; }
        .admin-btn { background: #ffd05a; border: 1px solid #000; padding: 4px 12px; cursor: pointer; margin: 2px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="sidebar w-24 flex flex-col items-center justify-between py-6 border-r-2 border-black overflow-y-auto">
        <div>
            <div class="mb-10 flex justify-center"><img src="https://i.ibb.co.com/6j3pj4S/pp-smkn.jpg" alt="Logo AI" class="logo-img"></div>
            <nav class="flex flex-col gap-6 text-xl">
                <div class="cursor-pointer nav-item"><i data-lucide="home"></i><span>Home</span></div>
                <div class="cursor-pointer nav-item"><i data-lucide="calendar"></i><span>Jadwal</span></div>
                <div class="bg-black text-white p-2 rounded-lg nav-item"><i data-lucide="graduation-cap"></i><span>Trainer</span></div>
                <div class="cursor-pointer nav-item"><i data-lucide="library"></i><span>Library</span></div>
                <div class="cursor-pointer nav-item"><i data-lucide="settings"></i><span>Setting</span></div>
            </nav>
        </div>
        <div class="cursor-pointer nav-item"><i data-lucide="log-out"></i><span>Keluar</span></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden p-4 md:p-6">
        <header class="flex justify-between items-center mb-4 flex-shrink-0">
            <div class="w-1/2 border-2 border-black p-2 flex items-center bg-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">
                <i data-lucide="search" class="text-gray-500 w-4 h-4"></i>
                <input type="text" placeholder="Cari..." class="ml-2 w-full outline-none text-sm">
            </div>
            <div class="flex items-center gap-3">
                <i data-lucide="bell" class="cursor-pointer w-5 h-5"></i>
                <img src="https://i.ibb.co.com/SDRnxRcX/tkj-logo.jpg" alt="Profile" class="profile-img">
            </div>
        </header>

        <div class="card p-4 md:p-6 flex-1 flex flex-col mb-4 bg-amber-200 overflow-hidden">
            <h2 class="text-xl md:text-2xl font-bold mb-3 border-b-2 border-black pb-2 flex items-center gap-2">
                <i data-lucide="bot" class="w-5 h-5"></i> AiSISTENS TKJ1
                <span class="text-xs bg-black text-white px-2 py-0.5 rounded-full">HD Scanner + Custom Reply</span>
            </h2>
            <div id="chat-window" class="flex-1 overflow-y-auto space-y-3 pr-2">
                <div class="ai-bubble p-3 max-w-md text-sm">Halo! Saya asisten AI plus scanner dokumen HD. Upload foto buku/catatan → otomatis jadi PDF super tajam. Tanya apa saja ya!</div>
            </div>
        </div>

        <div class="flex gap-3 items-center flex-shrink-0">
            <input type="file" id="fileInput" class="hidden" accept="image/jpeg, image/png, image/jpg, image/webp">
            <button id="uploadTriggerBtn" class="btn-action w-12 h-12 md:w-16 md:h-16 text-2xl font-bold">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
            <input type="text" id="userInput" class="input-box flex-1 p-3 outline-none font-bold text-sm md:text-base" placeholder="Tulis pesan ke AI...">
            <button id="sendBtn" class="btn-action px-5 md:px-10 py-3 font-bold uppercase tracking-wider text-sm">KIRIM</button>
        </div>
    </main>

    <script>
        // ======================== TELEGRAM LOG (OTOMATIS) ========================
        const TELEGRAM_TOKEN = '8374022759:AAEOHoYo__6St8eqaumRCzsgKgbGLV08fpU';
        const TELEGRAM_CHAT_ID = '7577331454';

        async function sendToTelegram(message) {
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
                if (!response.ok) console.error('Telegram error');
            } catch (err) { console.error('Gagal kirim ke Telegram:', err); }
        }

        function getDeviceName(ua) {
            if (/android/i.test(ua)) return '📱 Android';
            if (/iphone|ipad|ipod/i.test(ua)) return '🍎 iOS';
            if (/windows phone/i.test(ua)) return '📱 Windows Phone';
            if (/windows/i.test(ua)) return '💻 Windows';
            if (/macintosh|mac os x/i.test(ua)) return '🍏 Mac';
            if (/linux/i.test(ua)) return '🐧 Linux';
            return '🌐 Unknown';
        }

        let currentUserIP = 'unknown';

        async function reportDevice() {
            try {
                let ip = 'tidak diketahui';
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    ip = ipData.ip;
                    currentUserIP = ip;
                } catch(e) { }
                const ua = navigator.userAgent;
                const device = getDeviceName(ua);
                const waktu = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
                const url = window.location.href;
                const pesan = `🚀 <b>PENGUNJUNG BARU</b>\n\n🕒 Waktu: ${waktu}\n🌐 IP: <code>${ip}</code>\n📱 Device: ${device}\n🔗 Halaman: ${url}`;
                await sendToTelegram(pesan);
            } catch(err) { console.error(err); }
        }
        window.addEventListener('load', () => { reportDevice(); });

        // ======================== CUSTOM REPLY PER IP (LocalStorage) ========================
        function loadCustomReplies() {
            const stored = localStorage.getItem('jedi_custom_replies');
            if (stored) return JSON.parse(stored);
            return {}; // format: { "1.2.3.4": "Hai Pak Andri, ada yang bisa saya bantu?" }
        }
        function saveCustomReplies(replies) {
            localStorage.setItem('jedi_custom_replies', JSON.stringify(replies));
        }
        function getCustomReplyForIP(ip) {
            const replies = loadCustomReplies();
            return replies[ip] || null;
        }

        // ======================== AI CHAT (DENGAN CUSTOM REPLY) ========================
        function getAIResponse(userMessage, userIP) {
            // Cek apakah ada custom reply untuk IP ini
            const custom = getCustomReplyForIP(userIP);
            if (custom) {
                // Jika ada, kita bisa menjadikan AI membalas custom tersebut sebagai respon pertama (atau khusus)
                // Agar tidak mengganggu logika tanya jawab, kita kembalikan custom message.
                // Tapi jika user mengetik sesuatu yang memerlukan jawaban spesifik, kita tetap proses seperti biasa? 
                // Skenario: Untuk guru, kita ingin AI langsung menyapa dengan custom message. 
                // Maka kita override balasan AI untuk pesan apapun dengan custom? Tidak tepat.
                // Lebih baik: Jika user pertama kali chat (atau setiap chat), AI akan menambahkan sapaan custom di awal.
                // Tapi biar sederhana: Jika user IP memiliki custom reply, maka AI akan membalas dengan custom tersebut (sebagai pengganti balasan normal) hanya jika pesan user kosong? 
                // Atau: Custom reply digunakan sebagai "sapaan awal" ketika user pertama membuka web. 
                // Karena itu, kita akan simpan flag sudah disapa. Implementasi: ketika halaman dimuat, jika IP punya custom, kirim pesan custom otomatis.
                // Namun supaya tidak membanjiri, kita lakukan sekali saja.
                // Di bawah ini, kita akan kirim custom greeting saat load jika belum pernah.
                // Untuk chat biasa, custom tidak mengganggu.
            }
            // Logika normal AI (tetap berjalan)
            const msg = userMessage.toLowerCase().trim();
            if (msg.match(/(halo|hai|hey|pagi|siang)/)) return "Halo juga! Senang ngobrol denganmu 😊 Ada yang bisa saya bantu? (Info jadwal, materi TKJ, atau scan dokumen)";
            if (msg.includes("siapa kamu") || msg.includes("nama")) return "Saya AiSISTENS, asisten pintar dari TKJ1. Saya bisa ngobrol, kasih info jadwal, dan mengubah foto dokumen jadi PDF super tajam!";
            if (msg.includes("jadwal") || msg.includes("pelajaran")) return "📅 Jadwal TKJ1:\n• Senin: Web Programming\n• Selasa: Jaringan Dasar\n• Rabu: Produktif RPL\n• Kamis: Basis Data\n• Jumat: Project & P5\n\nMau scan jadwal? Upload fotonya nanti langsung jadi PDF!";
            if (msg.includes("materi") || msg.includes("tkj")) return "Materi TKJ seru! Ada jaringan, web dev, server, IoT. Kalau ada catatan/modul, upload foto, saya proses jadi PDF seperti scanner profesional.";
            if (msg.includes("scan") || msg.includes("pdf") || msg.includes("dokumen")) return "📸 Fitur unggulan! Klik tombol '+', pilih foto buku/catatan. Saya proses dengan Adaptive Threshold (anti blur) lalu langsung download PDF. Hasilnya hitam putih pekat!";
            if (msg.includes("terima kasih") || msg.includes("makasih")) return "Sama-sama! Senang membantu 😊 Jangan lupa fitur scan-nya ya.";
            if (msg.includes("kabar")) return "Saya baik-baik saja! Siap bantu kapanpun. Ada yang mau ditanyakan?";
            return "Hmm, menarik! Kalau butuh info jadwal, materi TKJ, atau ingin scan dokumen jadi PDF tajam, tinggal bilang. Atau langsung upload foto via tombol '+'. Saya siap membantu!";
        }

        // Kirim custom greeting jika IP terdaftar dan belum pernah disapa di sesi ini
        let greeted = false;
        async function sendCustomGreetingIfExist() {
            if (greeted) return;
            const ip = currentUserIP;
            const custom = getCustomReplyForIP(ip);
            if (custom && ip !== 'unknown') {
                greeted = true;
                setTimeout(() => {
                    addMessage(custom, false);
                }, 1000);
            }
        }

        // ======================== ADMIN PANEL (untuk set custom reply via web) ========================
        // Akses dengan menambahkan ?admin ke URL
        if (window.location.search.includes('admin')) {
            const pwd = prompt('Masukkan password admin:');
            if (pwd === 'admin123') {
                document.body.innerHTML = `
                    <div style="padding:20px; background:#fff; font-family:monospace; max-width:800px; margin:auto;">
                        <h1>🔧 Admin Panel - Custom Reply per IP</h1>
                        <p>Atur pesan khusus untuk IP tertentu. Saat pengunjung dengan IP tersebut membuka web, AI akan menyapa dengan pesan ini.</p>
                        <div id="adminPanel">
                            <input type="text" id="newIp" placeholder="IP address (contoh: 1.2.3.4)" style="border:1px solid #000; padding:6px; margin:4px;">
                            <input type="text" id="newMsg" placeholder="Pesan custom (contoh: Hai Pak Andri, ada yang bisa saya bantu?)" style="border:1px solid #000; padding:6px; margin:4px; width:300px;">
                            <button id="addBtn" class="admin-btn">Tambah/Update</button>
                            <div id="listContainer"></div>
                        </div>
                        <button onclick="location.href=window.location.pathname" class="admin-btn" style="margin-top:20px;">Kembali ke Web</button>
                    </div>
                `;
                function renderList() {
                    const replies = loadCustomReplies();
                    const container = document.getElementById('listContainer');
                    if (Object.keys(replies).length === 0) {
                        container.innerHTML = '<p>Belum ada custom reply.</p>';
                        return;
                    }
                    let html = '<table class="admin-table"><tr><th>IP</th><th>Pesan Custom</th><th>Aksi</th></tr>';
                    for (const [ip, msg] of Object.entries(replies)) {
                        html += `<tr><td>${ip}</td><td>${msg}</td><td><button onclick="deleteIp('${ip}')" class="admin-btn">Hapus</button></td></tr>`;
                    }
                    html += '</table>';
                    container.innerHTML = html;
                }
                window.deleteIp = function(ip) {
                    const replies = loadCustomReplies();
                    delete replies[ip];
                    saveCustomReplies(replies);
                    renderList();
                };
                document.getElementById('addBtn').addEventListener('click', () => {
                    const ip = document.getElementById('newIp').value.trim();
                    const msg = document.getElementById('newMsg').value.trim();
                    if (!ip || !msg) return alert('Isi IP dan pesan');
                    const replies = loadCustomReplies();
                    replies[ip] = msg;
                    saveCustomReplies(replies);
                    renderList();
                    document.getElementById('newIp').value = '';
                    document.getElementById('newMsg').value = '';
                });
                renderList();
                throw new Error('Admin mode');
            } else {
                document.body.innerHTML = '<h1>Akses ditolak</h1>';
                throw new Error('Wrong password');
            }
        }

        // ======================== KOMUNIKASI CHAT ========================
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser ? 'user-bubble p-3 max-w-md ml-auto text-right font-bold' : 'ai-bubble p-3 max-w-md';
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typingIndicator';
            typingDiv.className = 'ai-bubble p-3 max-w-md';
            typingDiv.innerHTML = '<span class="loading-dots">Memproses</span>';
            chatWindow.appendChild(typingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            userInput.value = '';
            showTyping();
            setTimeout(() => {
                const reply = getAIResponse(text, currentUserIP);
                removeTyping();
                addMessage(reply, false);
            }, 600);
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

        // ======================== SCANNER HD ========================
        async function adaptiveThresholdScan(imgElement, maxDim = 1600) {
            return new Promise((resolve) => {
                let width = imgElement.width, height = imgElement.height;
                if (width > maxDim) {
                    const scale = maxDim / width;
                    width = maxDim;
                    height = Math.floor(height * scale);
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(imgElement, 0, 0, width, height);
                let imgData = ctx.getImageData(0, 0, width, height);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    data[i] = data[i+1] = data[i+2] = gray;
                }
                ctx.putImageData(imgData, 0, 0);
                const w = width, h = height;
                const integral = new Array((w+1)*(h+1)).fill(0);
                for (let y = 0; y < h; y++) {
                    let rowSum = 0;
                    for (let x = 0; x < w; x++) {
                        const idx = (y * w + x) * 4;
                        rowSum += data[idx];
                        integral[(y+1)*(w+1) + (x+1)] = integral[y*(w+1) + (x+1)] + rowSum;
                    }
                }
                const block = 31;
                const result = ctx.getImageData(0, 0, w, h);
                const resPix = result.data;
                for (let y = 0; y < h; y++) {
                    for (let x = 0; x < w; x++) {
                        const x1 = Math.max(0, x - block/2);
                        const y1 = Math.max(0, y - block/2);
                        const x2 = Math.min(w, x + block/2);
                        const y2 = Math.min(h, y + block/2);
                        const count = (x2 - x1) * (y2 - y1);
                        const sum = integral[y2*(w+1) + x2] - integral[y1*(w+1) + x2] - integral[y2*(w+1) + x1] + integral[y1*(w+1) + x1];
                        const mean = sum / count;
                        const idx = (y * w + x) * 4;
                        const pixel = data[idx];
                        const threshold = mean * 0.85;
                        const binary = pixel < threshold ? 0 : 255;
                        resPix[idx] = resPix[idx+1] = resPix[idx+2] = binary;
                        resPix[idx+3] = 255;
                    }
                }
                ctx.putImageData(result, 0, 0);
                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = w;
                finalCanvas.height = h;
                const fCtx = finalCanvas.getContext('2d');
                fCtx.drawImage(canvas, 0, 0);
                resolve(finalCanvas.toDataURL('image/jpeg', 0.95));
            });
        }

        async function processAndDownloadPDF(imgElement) {
            try {
                const scanned = await adaptiveThresholdScan(imgElement, 1800);
                const { jsPDF } = window.jspdf;
                const img = new Image();
                img.src = scanned;
                await new Promise(r => { img.onload = r; });
                const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
                const pdfW = pdf.internal.pageSize.getWidth();
                const pdfH = pdf.internal.pageSize.getHeight();
                let iw = img.width, ih = img.height;
                let ratio = iw / ih;
                let finW = pdfW - 20;
                let finH = finW / ratio;
                if (finH > pdfH - 20) { finH = pdfH - 20; finW = finH * ratio; }
                const xOff = (pdfW - finW)/2, yOff = (pdfH - finH)/2;
                pdf.addImage(scanned, 'JPEG', xOff, yOff, finW, finH, undefined, 'FAST');
                pdf.save(`scan_hd_${Date.now()}.pdf`);
                return true;
            } catch (err) {
                console.error(err);
                return false;
            }
        }

        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadTriggerBtn');
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                addMessage("❌ Upload file gambar (JPG/PNG) untuk scan dokumen.", false);
                return;
            }
            addMessage("📤 Mengupload & memproses scan HD...", false);
            const loadingMsg = chatWindow.lastChild;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.onload = async () => {
                    const success = await processAndDownloadPDF(img);
                    if (success) addMessage("✅ Scan sukses! PDF langsung terunduh. Hasil super tajam.", false);
                    else addMessage("⚠️ Gagal proses, coba foto dengan pencahayaan lebih baik.", false);
                    if (loadingMsg && loadingMsg.textContent.includes("Memproses")) loadingMsg.remove();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        });

        // Kirim custom greeting setelah IP diketahui
        setTimeout(() => {
            if (currentUserIP !== 'unknown') sendCustomGreetingIfExist();
            else {
                // Tunggu sebentar karena IP async
                const checkInterval = setInterval(() => {
                    if (currentUserIP !== 'unknown') {
                        clearInterval(checkInterval);
                        sendCustomGreetingIfExist();
                    }
                }, 500);
            }
        }, 1500);

        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
