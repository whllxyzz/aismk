<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin — Absensi MPP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
/* =========================================================
   DASHBOARD ADMIN — Absensi MPP
   Tema: NEO-BRUTALIST — selaras dengan app siswa
   ========================================================= */
:root{
  --bg:#F2EFE6; --bg-2:#EAE5D6;
  --surface: #FFFFFF;
  --surface-2: #FAF8F2;
  --surface-border: #14140F;
  --gold:#2F5EFF; --gold-soft:#6E8CFF; --gold-glow: rgba(47,94,255,0.28);
  --cream:#14140F; --teal:#00B87A; --teal-glow: rgba(0,184,122,0.25);
  --red:#FF3B3B; --yellow:#FFD23F;
  --text:#14140F; --text-muted:#55523F; --text-dim:#8A8670;
  --radius-xl:20px; --radius-lg:16px; --radius-sm:10px;
  --border-w:2.5px;
  --shadow-hard: 6px 6px 0 var(--surface-border);
  --ease: cubic-bezier(.16,1,.3,1);
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background: var(--bg);
  color: var(--text);
  font-family:'Inter', sans-serif;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  padding:24px;
  -webkit-font-smoothing:antialiased;
  position:relative;
  overflow-x:hidden;
}
button:focus-visible, input:focus-visible, a:focus-visible{
  outline:2.5px solid var(--gold); outline-offset:2px;
}
body::before{
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 520px 400px at 92% 6%, rgba(255,210,63,0.32), transparent 62%),
    radial-gradient(ellipse 460px 420px at 4% 96%, rgba(47,94,255,0.10), transparent 60%);
}
::-webkit-scrollbar{ width:5px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:var(--surface-border); border-radius:10px; }

.container{
  position:relative; z-index:1;
  max-width:820px; width:100%;
  background: var(--surface);
  border:3px solid var(--surface-border);
  border-radius:var(--radius-lg);
  padding:34px 32px;
  box-shadow:9px 9px 0 var(--surface-border);
  transition: all .3s var(--ease);
}
.container::before{ content:none; }

/* ===== LOGIN ===== */
.login-section{ text-align:center; padding:26px 6px; }
.login-section .lock-icon{
  font-size:44px; margin-bottom:14px; display:flex; align-items:center; justify-content:center;
  width:78px; height:78px; margin-left:auto; margin-right:auto; border-radius:16px;
  background:var(--yellow); border:2.5px solid var(--surface-border);
  box-shadow:4px 4px 0 var(--surface-border);
  transform:rotate(-3deg);
}
.login-section h1{
  font-family:'Space Grotesk', sans-serif; font-size:26px; font-weight:800;
  color:var(--text);
  margin-bottom:6px;
}
.login-section .sub{ color:var(--text-muted); font-size:13.5px; margin-bottom:30px; line-height:1.5; font-weight:500; }
.login-form{ max-width:320px; margin:0 auto; }
.login-form input{
  width:100%; padding:15px 20px; border-radius:12px;
  border:2.5px solid var(--surface-border);
  background:var(--surface-2); color:var(--text);
  font-size:15px; font-family:'Inter', sans-serif; font-weight:600;
  transition:box-shadow .15s var(--ease);
  margin-bottom:14px;
}
.login-form input::placeholder{ color:var(--text-dim); font-weight:500; }
.login-form input:focus{
  outline:none; box-shadow:4px 4px 0 var(--surface-border);
}
.login-form .btn-login{
  width:100%; padding:15px; border:2.5px solid var(--surface-border); border-radius:100px;
  font-size:13px; font-weight:800; color:#fff; letter-spacing:0.02em;
  background:var(--gold);
  cursor:pointer; transition:all .1s var(--ease);
  font-family:'Inter', sans-serif;
  box-shadow:5px 5px 0 var(--surface-border);
  text-transform:uppercase;
}
.login-form .btn-login:hover{ transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--surface-border); }
.login-form .btn-login:active{ transform:translate(3px,3px); box-shadow:none; }
.error-msg{ color:#B8241F; font-size:12.5px; margin-top:14px; min-height:16px; font-weight:700; }

/* ===== DASHBOARD HEADER ===== */
.dash-header{
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:12px; margin-bottom:6px;
}
.dash-header h1{
  font-family:'Space Grotesk', sans-serif; font-size:22px; font-weight:800;
  color:var(--text); display:flex; align-items:center; gap:10px;
}
.dash-header h1 span{ color:var(--gold); }
.dash-header .logout-btn{
  background:var(--surface); border:2.5px solid var(--surface-border);
  color:var(--text); padding:8px 18px; border-radius:100px;
  font-size:12.5px; font-weight:800; cursor:pointer; transition:all .1s var(--ease);
  font-family:'Inter', sans-serif;
  box-shadow:3px 3px 0 var(--surface-border);
}
.dash-header .logout-btn:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--surface-border); }
.dash-header .logout-btn:active{ transform:translate(2px,2px); box-shadow:none; }
.dash-sub{
  color:var(--text-muted); font-size:12.5px; margin-bottom:26px; font-weight:600;
  display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; align-items:center;
}
.dash-sub .live-badge{
  background:var(--teal); color:#fff; padding:3px 13px;
  border-radius:100px; font-size:10.5px; font-weight:800;
  border:2px solid var(--surface-border);
  display:inline-flex; align-items:center; gap:6px;
}
.live-badge .dot{
  width:6px; height:6px; background:#fff; border-radius:50%;
  animation:pulse-dot 1.4s ease-in-out infinite;
}
@keyframes pulse-dot{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.4);} }

/* ===== STATS ===== */
.stats-row{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:26px; }
.stat-card{
  position:relative;
  background:var(--surface-2); border-radius:14px; padding:16px 16px;
  border:2.5px solid var(--surface-border); text-align:center;
  box-shadow:4px 4px 0 var(--surface-border);
  transition:transform .12s var(--ease), box-shadow .12s var(--ease);
}
.stat-card:hover{ transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--surface-border); }
.stat-card .stat-number{
  font-family:'Space Grotesk', sans-serif; font-size:27px; font-weight:800; line-height:1.15;
}
.stat-card .stat-label{
  font-size:11.5px; color:var(--text-muted); font-weight:700; margin-top:2px;
}
.stat-total .stat-number{ color:var(--text); }
.stat-pending .stat-number{ color:var(--gold); }
.stat-done .stat-number{ color:var(--teal); }
.stat-total{ background:var(--surface); }
.stat-pending{ background:#FFF6D8; }
.stat-done{ background:#DFFAEF; }

/* ===== TABS ===== */
.tabs{
  display:flex; gap:6px; margin-bottom:20px;
  background:var(--bg-2); padding:5px; border-radius:14px;
  border:2.5px solid var(--surface-border);
}
.tab-btn{
  flex:1; padding:11px 12px; border:none; border-radius:10px;
  font-weight:800; font-size:12.5px; cursor:pointer; transition:all .15s var(--ease);
  background:transparent; color:var(--text-muted); font-family:'Inter', sans-serif;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.tab-btn:hover{ color:var(--text); }
.tab-btn.active{
  background:var(--surface); color:var(--text);
  border:2px solid var(--surface-border); box-shadow:2px 2px 0 var(--surface-border);
}
.tab-btn .badge{
  background:var(--yellow); color:var(--text); border:1.5px solid var(--surface-border);
  padding:1px 8px; border-radius:100px; font-size:10.5px; font-weight:800;
  min-width:20px; text-align:center;
}
.tab-btn.active .badge{ background:var(--gold); color:#fff; border-color:var(--surface-border); }

.tab-content{ display:none; animation:fadeIn .25s ease; }
.tab-content.active{ display:block; }
@keyframes fadeIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

/* ===== LIST CARDS ===== */
.list-container{ max-height:420px; overflow-y:auto; padding:2px 6px 2px 2px; }
.card-item{
  position:relative;
  background:var(--surface-2); border-radius:14px; padding:15px 18px 15px 18px;
  margin-bottom:10px; border:2.5px solid var(--surface-border);
  display:flex; justify-content:space-between; align-items:center; gap:12px;
  transition:transform .12s var(--ease), box-shadow .12s var(--ease); animation:slideUp .25s var(--ease);
  box-shadow:4px 4px 0 var(--surface-border);
}
@keyframes slideUp{ from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.card-item:hover{ transform:translate(-1px,-1px); box-shadow:5px 5px 0 var(--surface-border); }

.card-left{ display:flex; flex-direction:column; gap:3px; min-width:0; }
.card-left .name{
  font-weight:800; font-size:14.5px; color:var(--text);
  display:flex; align-items:center; gap:8px;
}
.card-left .name .no-badge{
  background:var(--bg-2); color:var(--text-muted); font-size:10px; font-weight:800;
  padding:1px 8px; border-radius:100px; border:1.5px solid var(--surface-border);
  font-family:'JetBrains Mono', monospace;
}
.card-left .meta{
  font-size:11.5px; color:var(--text-dim); display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-weight:600;
}
.card-left .meta .map-link{
  color:var(--gold); text-decoration:none; font-size:11px; font-weight:800;
  display:inline-flex; align-items:center; gap:4px;
}
.card-left .meta .map-link:hover{ text-decoration:underline; }

.card-right{ display:flex; align-items:center; gap:10px; flex-shrink:0; }
.status-badge{
  display:inline-block; padding:4px 13px; border-radius:100px;
  font-size:10.5px; font-weight:800; white-space:nowrap;
  border:2px solid var(--surface-border);
}
.status-pending{ background:var(--yellow); color:var(--text); }
.status-hadir{ background:var(--teal); color:#fff; }
.status-izin{ background:var(--red); color:#fff; }
.status-sakit{ background:var(--red); color:#fff; }

.btn-confirm{
  border:2px solid var(--surface-border); padding:7px 17px; border-radius:100px; font-weight:800; font-size:11.5px;
  cursor:pointer; transition:all .1s var(--ease);
  background:var(--gold);
  color:#fff; font-family:'Inter', sans-serif; white-space:nowrap;
  box-shadow:3px 3px 0 var(--surface-border);
}
.btn-confirm:hover{ transform:translate(-1px,-1px); box-shadow:4px 4px 0 var(--surface-border); }
.btn-confirm:active{ transform:translate(2px,2px); box-shadow:none; }
.btn-confirm:disabled{ opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }

.empty-state{ text-align:center; color:var(--text-dim); padding:44px 0; font-size:13.5px; font-weight:600; }
.empty-state .icon{ font-size:30px; display:block; margin-bottom:12px; }

/* ===== RESPONSIVE ===== */
@media (max-width:600px){
  .container{ padding:22px 18px; border-radius:18px; box-shadow:6px 6px 0 var(--surface-border); }
  .stats-row{ grid-template-columns:1fr 1fr 1fr; gap:7px; }
  .stat-card{ padding:11px 8px; }
  .stat-card .stat-number{ font-size:20px; }
  .stat-card .stat-label{ font-size:10px; }
  .dash-header h1{ font-size:19px; }
  .card-item{ flex-direction:column; align-items:stretch; gap:10px; padding:14px 16px; }
  .card-right{ justify-content:space-between; }
  .tabs{ flex-wrap:nowrap; overflow-x:auto; }
  .tab-btn{ font-size:12px; padding:9px 10px; flex:0 0 auto; }
}
@media (max-width:420px){
  .stats-row{ grid-template-columns:1fr; gap:6px; }
  .stat-card{ display:flex; align-items:center; justify-content:space-between; text-align:left; padding:12px 16px; }
}
@media (prefers-reduced-motion: reduce){
  *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- ===== LOGIN ===== -->
  <div id="loginSection" class="login-section">
    <span class="lock-icon">🔐</span>
    <h1>Dashboard Admin</h1>
    <div class="sub">Masukkan password untuk mengelola absensi hari ini.</div>
    <div class="login-form">
      <input type="password" id="passwordInput" placeholder="Masukkan password" />
      <button class="btn-login" onclick="login()">Masuk ke Dashboard</button>
      <div class="error-msg" id="loginError"></div>
    </div>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="dashboardSection" style="display:none;">

    <!-- HEADER -->
    <div class="dash-header">
      <h1>📋 <span>Dashboard</span> Absensi</h1>
      <button class="logout-btn" onclick="logout()">🚪 Keluar</button>
    </div>
    <div class="dash-sub">
      <span id="infoDate">Hari ini: --</span>
      <span class="live-badge"><span class="dot"></span> Live (1 detik)</span>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card stat-total"><div class="stat-number" id="statTotal">0</div><div class="stat-label">Total Absen</div></div>
      <div class="stat-card stat-pending"><div class="stat-number" id="statPending">0</div><div class="stat-label">🔄 Menunggu</div></div>
      <div class="stat-card stat-done"><div class="stat-number" id="statDone">0</div><div class="stat-label">✅ Selesai</div></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending" onclick="switchTab('pending')">
        🔄 Menunggu <span class="badge" id="pendingBadge">0</span>
      </button>
      <button class="tab-btn" data-tab="confirmed" onclick="switchTab('confirmed')">
        ✅ Selesai <span class="badge" id="confirmedBadge">0</span>
      </button>
    </div>

    <!-- TAB PENDING -->
    <div class="tab-content active" id="tab-pending">
      <div class="list-container" id="pendingList">
        <div class="empty-state"><span class="icon">⏳</span>Memuat data...</div>
      </div>
    </div>

    <!-- TAB CONFIRMED -->
    <div class="tab-content" id="tab-confirmed">
      <div class="list-container" id="confirmedList">
        <div class="empty-state"><span class="icon">📭</span>Memuat data...</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ============================================================
  // KONFIGURASI — GANTI DENGAN URL BACKEND DAN PASSWORD ANDA
  // ============================================================
  const PASSWORD = "admin123";
  const GAS_URL = "https://script.google.com/macros/s/AKfycbxzm4quOwyYwbCTSwY4d86LVj4ubJzvcwtYsZv7Sbl8TaoBTMkcUjMlno5r4qAhiFQ/exec";

  let refreshInterval = null;

  // ============================================================
  // LOGIN / LOGOUT
  // ============================================================
  function login() {
    const pass = document.getElementById("passwordInput").value;
    if (pass === PASSWORD) {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("dashboardSection").style.display = "block";
      document.getElementById("loginError").textContent = "";
      loadAllData();
      if (refreshInterval) clearInterval(refreshInterval);
      refreshInterval = setInterval(loadAllData, 1000);
    } else {
      document.getElementById("loginError").textContent = "❌ Password salah!";
    }
  }

  function logout() {
    document.getElementById("loginSection").style.display = "block";
    document.getElementById("dashboardSection").style.display = "none";
    document.getElementById("passwordInput").value = "";
    document.getElementById("loginError").textContent = "";
    if (refreshInterval) {
      clearInterval(refreshInterval);
      refreshInterval = null;
    }
  }

  // ============================================================
  // TABS
  // ============================================================
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
  }

  // ============================================================
  // LOAD DATA
  // ============================================================
  async function loadAllData() {
    const [pendingData, confirmedData] = await Promise.all([
      fetchData('getTodayPending'),
      fetchData('getTodayConfirmed')
    ]);
    renderPending(pendingData);
    renderConfirmed(confirmedData);
    updateStats(pendingData, confirmedData);
    updateDate();
  }

  async function fetchData(action) {
    try {
      const resp = await fetch(`${GAS_URL}?action=${action}`);
      const json = await resp.json();
      return json.result === "success" ? json.data : [];
    } catch (e) {
      console.error(`Error ${action}:`, e);
      return [];
    }
  }

  // ============================================================
  // RENDER PENDING
  // ============================================================
  function renderPending(data) {
    const container = document.getElementById('pendingList');
    const badge = document.getElementById('pendingBadge');
    badge.textContent = data.length;

    if (!data || data.length === 0) {
      container.innerHTML = `<div class="empty-state"><span class="icon">✅</span>Tidak ada yang menunggu verifikasi.</div>`;
      return;
    }

    // Urutkan berdasarkan jam (terbaru di atas)
    data.sort((a, b) => b.jam.localeCompare(a.jam));

    let html = '';
    data.forEach((item, index) => {
      const mapsUrl = `https://www.google.com/maps?q=${item.latitude},${item.longitude}`;
      html += `
        <div class="card-item" id="pending-row-${index}">
          <div class="card-left">
            <div class="name">
              ${item.nama}
              <span class="no-badge">#${item.no}</span>
            </div>
            <div class="meta">
              <span>🕒 ${item.jam}</span>
              <a href="${mapsUrl}" target="_blank" class="map-link">📍 Lihat Lokasi</a>
            </div>
          </div>
          <div class="card-right">
            <span class="status-badge status-pending">Menunggu</span>
            <button class="btn-confirm" onclick="confirmAbsen('${item.nama}', ${index})">Verifikasi</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // ============================================================
  // RENDER CONFIRMED
  // ============================================================
  function renderConfirmed(data) {
    const container = document.getElementById('confirmedList');
    const badge = document.getElementById('confirmedBadge');
    badge.textContent = data.length;

    if (!data || data.length === 0) {
      container.innerHTML = `<div class="empty-state"><span class="icon">📭</span>Belum ada siswa yang selesai diverifikasi hari ini.</div>`;
      return;
    }

    // Urutkan berdasarkan jam (terbaru di atas)
    data.sort((a, b) => b.jam.localeCompare(a.jam));

    let html = '';
    data.forEach((item) => {
      let statusClass = 'status-hadir';
      let statusLabel = 'Hadir';
      if (item.status === 'Izin') { statusClass = 'status-izin'; statusLabel = 'Izin'; }
      else if (item.status === 'Sakit') { statusClass = 'status-sakit'; statusLabel = 'Sakit'; }

      html += `
        <div class="card-item">
          <div class="card-left">
            <div class="name">
              ${item.nama}
              <span class="no-badge">#${item.no}</span>
            </div>
            <div class="meta">
              <span>🕒 ${item.jam}</span>
              <span>✅ Diverifikasi</span>
            </div>
          </div>
          <div class="card-right">
            <span class="status-badge ${statusClass}">${statusLabel}</span>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  // ============================================================
  // STATS
  // ============================================================
  function updateStats(pending, confirmed) {
    const total = pending.length + confirmed.length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statDone').textContent = confirmed.length;
  }

  // ============================================================
  // CONFIRM ACTION
  // ============================================================
  async function confirmAbsen(nama, index) {
    const btn = document.querySelector(`#pending-row-${index} .btn-confirm`);
    if (btn) { btn.disabled = true; btn.textContent = "Memproses..."; }

    try {
      const resp = await fetch(`${GAS_URL}?action=confirm&nama=${encodeURIComponent(nama)}`);
      const data = await resp.json();

      if (data.result === "success") {
        // Hapus baris pending
        const row = document.getElementById(`pending-row-${index}`);
        if (row) row.remove();

        // Hitung ulang sisa pending
        const remaining = document.querySelectorAll('#pending-list .card-item').length;
        document.getElementById('pendingBadge').textContent = remaining;

        if (remaining === 0) {
          document.getElementById('pendingList').innerHTML = `<div class="empty-state"><span class="icon">✅</span>Tidak ada yang menunggu verifikasi.</div>`;
        }

        // Refresh confirmed list
        const confirmedData = await fetchData('getTodayConfirmed');
        renderConfirmed(confirmedData);
        // Update stats
        const pendingData = await fetchData('getTodayPending');
        updateStats(pendingData, confirmedData);

      } else {
        alert("❌ Gagal verifikasi: " + (data.message || "Error"));
        if (btn) { btn.disabled = false; btn.textContent = "Verifikasi"; }
      }
    } catch (err) {
      alert("⚠️ Error: " + err.message);
      if (btn) { btn.disabled = false; btn.textContent = "Verifikasi"; }
    }
  }

  // ============================================================
  // UPDATE DATE
  // ============================================================
  function updateDate() {
    const now = new Date();
    const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
    document.getElementById('infoDate').textContent = `📅 Hari ini: ${now.toLocaleDateString('id-ID', options)}`;
  }

  // ============================================================
  // ENTER KEY UNTUK LOGIN
  // ============================================================
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });
</script>

</body>
</html>
